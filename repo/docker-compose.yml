services:
  postgres:
    image: postgres:16-alpine
    container_name: culinary_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-culinary_studio}
      POSTGRES_USER: ${POSTGRES_USER:-culinary_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-culinary_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-culinary_user} -d ${POSTGRES_DB:-culinary_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: culinary_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: culinary_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://culinary_user:culinary_password@postgres:5432/culinary_studio?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: culinary_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://backend:4000}
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    expose:
      - "5173"
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  pg_data:
  redis_data:

networks:
  app_net:
    driver: bridge
